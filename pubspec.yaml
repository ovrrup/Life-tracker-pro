name: lifetrack
description: A sleek personal life tracking app with multiplayer support.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Backend & Auth
  supabase_flutter: ^2.3.0

  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Navigation
  go_router: ^13.2.0

  # UI
  google_fonts: ^6.1.0
  fl_chart: ^0.67.0
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  gap: ^3.0.1

  # Storage & Utils
  shared_preferences: ^2.2.2
  uuid: ^4.3.3
  intl: ^0.19.0
  collection: ^1.18.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.8
  riverpod_generator: ^2.3.9

flutter:
  uses-material-design: true